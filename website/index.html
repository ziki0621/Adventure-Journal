<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adventure Journal</title>
    <link rel="icon" href="assets/icon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="texture" aria-hidden="true">
      <svg width="100%" height="100%" class="texture-stains">
        <filter id="stains">
          <feTurbulence type="fractalNoise" baseFrequency="0.004" numOctaves="3" />
          <feColorMatrix type="saturate" values="0" />
        </filter>
        <rect width="100%" height="100%" filter="url(#stains)" />
      </svg>
      <svg width="100%" height="100%" class="texture-noise">
        <filter id="noise">
          <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch" />
          <feColorMatrix type="saturate" values="0" />
        </filter>
        <rect width="100%" height="100%" filter="url(#noise)" />
      </svg>
      <div class="texture-lines-h"></div>
      <div class="texture-lines-v"></div>
      <div class="texture-shadow-outer"></div>
      <div class="texture-shadow-inner"></div>
    </div>
    <div class="page">
      <div class="app-shell">
        <aside class="wire sidebar">
          <div class="wire-inner sidebar-inner">
            <div class="brand">
              <div class="brand-mark">
                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 4h11a2 2 0 0 1 2 2v14H8a3 3 0 0 1-3-3V5a1 1 0 0 1 1-1z"></path><path d="M8 20a3 3 0 0 1 0-6h11"></path><path d="M9 8h6"></path><path d="M9 11h4"></path></svg>
              </div>
              <div>
                <h1 class="serif">Adventure Journal</h1>
                <p>Guild Routine</p>
              </div>
            </div>
            <nav class="nav-list" id="sideNav"></nav>
            <div class="sidebar-footer">
              <div class="sidebar-note">
                <div class="wire shaded">
                  <div class="wire-inner">
                    <p class="serif" id="sidebarQuote">"今日清单只放需要行动的契约。"</p>
                  </div>
                </div>
              </div>
              <div class="sidebar-clock wire">
                <div class="wire-inner" style="padding:6px 10px;text-align:center;">
                  <span class="clock-time serif" id="sidebarClock" style="font-size:18px;font-weight:700;letter-spacing:0.06em;">--:--</span>
                </div>
              </div>
              <button class="settings-button" type="button" id="openSettings">
                <span><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.08a1.7 1.7 0 0 0-1.03-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.08A1.7 1.7 0 0 0 4.64 8.94a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.88.34H9a1.7 1.7 0 0 0 1-1.56V3a2 2 0 1 1 4 0v.08a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.88V9c.28.6.88 1 1.56 1H21a2 2 0 1 1 0 4h-.08A1.7 1.7 0 0 0 19.4 15z"></path></svg><span id="settingsLabel">Settings</span></span>
              </button>
            </div>
          </div>
        </aside>

        <main class="wire main main-shell">
          <div class="wire-inner">
            <header class="topbar">
              <div class="topbar-left">
                <button class="menu-toggle" type="button" id="menuToggle" aria-label="Toggle navigation" aria-expanded="false" title="Menu">
                  <svg class="icon icon-menu" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"></path><path d="M4 12h16"></path><path d="M4 17h16"></path></svg>
                </button>
                <div>
                  <p class="eyebrow" id="viewEyebrow">Today</p>
                  <h2 class="view-title serif" id="viewTitle">Today's Quests</h2>
                  <p class="view-subtitle" id="viewSubtitle">按截止日期排列你今天该处理的任务。</p>
                </div>
              </div>
              <div class="top-actions">
                <button class="add-quest-button" type="button" id="openAdd" aria-label="New Quest" title="New Quest">
                  <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
                </button>
              </div>
            </header>

            <section class="content">
              <div id="viewContent"></div>
              <div id="dialogueView" class="dialogue-view task-field-hidden">
                <div class="dialogue-container">
                  <div class="dialogue-title-wrap">
                    <h1 class="dialogue-title serif">终端导引系统</h1>
                    <p class="dialogue-subtitle">与系统操作员通讯</p>
                  </div>
                  <div class="wire dialogue-box">
                    <div class="wire-inner dialogue-box-inner">
                      <button class="dialogue-close" type="button" id="dialogueClose" aria-label="Close">✕</button>
                      <div class="dialogue-scene">
                        <div class="dialogue-portrait-frame">
                          <img class="dialogue-portrait" src="assets/guide-anya.png" alt="旅行向导 安雅" />
                        </div>
                        <div class="dialogue-text-col">
                          <span class="dialogue-nameplate serif">旅行向导 安雅</span>
                          <div class="wire dialogue-speech" id="dialogueSpeech" data-dialogue-action="next">
                            <div class="wire-inner dialogue-speech-inner">
                              <p class="dialogue-speech-text serif" id="dialogueText"></p>
                              <div class="dialogue-options" id="dialogueOptions"></div>
                              <div class="dialogue-arrow" id="dialogueArrow">
                                <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  <!-- Chat input bar -->
                  <div class="dialogue-chat-bar" id="dialogueChatBar">
                    <div class="agent-status-pill" id="dialogueStatusPill">
                      <span class="agent-status-dot"></span>
                      <span class="agent-status-label">ONLINE</span>
                    </div>
                    <button class="agent-clear-btn" type="button" id="dialogueClearBtn" title="Clear conversation">Clear</button>
                    <div class="wire field dialogue-chat-input"><div class="wire-inner"><input id="dialogueInput" placeholder="和安雅说点什么..." autocomplete="off" /></div></div>
                    <button class="chamfer dialogue-chat-send" type="button" id="dialogueSend">
                      <span class="chamfer-outer"><span class="chamfer-mid"><span class="chamfer-line"><span class="chamfer-face">发送</span></span></span></span>
                    </button>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </main>
        <button class="sidebar-scrim" type="button" id="sidebarScrim" aria-label="Close navigation"></button>
      </div>
    </div>

    <nav class="wire bottom-nav" id="bottomNav"></nav>

    <div class="modal-backdrop" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <section class="wire modal">
        <div class="wire-inner">
          <div class="modal-head">
            <div class="section-title serif" id="modalTitle"><span class="diamond"></span><span class="text">Edit Quest</span><span class="diamond"></span></div>
            <button class="plain-icon-button" type="button" id="closeModal" aria-label="Close editor">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </div>
          <div class="form-stack">
            <!-- Standard fields (hidden in quest-lines mode) -->
            <div id="standardFields">
              <input id="editType" type="hidden" value="daily" />
              <div class="labeled-field">
                <label class="field-label" for="editTitle">任务标题</label>
                <div class="wire field"><div class="wire-inner"><input id="editTitle" placeholder="Quest title..." /></div></div>
              </div>
              <div class="modal-grid">
                <div class="labeled-field">
                  <label class="field-label" for="editStartDate">开始日期</label>
                  <div class="wire field"><div class="wire-inner"><input id="editStartDate" type="date" /></div></div>
                </div>
                <div class="labeled-field">
                  <label class="field-label" for="editEndDate">结束日期 <span style="font-weight:400;opacity:0.5;">（留空 = 当天）</span></label>
                  <div class="wire field"><div class="wire-inner"><input id="editEndDate" type="date" /></div></div>
                </div>
                <div class="labeled-field task-field-hidden" data-task-field="time">
                  <label class="field-label" for="editStartTime">时间段</label>
                  <div class="wire field" style="display:flex;gap:4px;align-items:center;">
                    <div class="wire-inner" style="flex:1;"><input id="editStartTime" type="time" placeholder="开始" /></div>
                    <span style="font-size:10px;opacity:0.5;">—</span>
                    <div class="wire-inner" style="flex:1;"><input id="editEndTime" type="time" placeholder="结束" /></div>
                  </div>
                </div>
                <div class="labeled-field" data-task-field="line">
                  <label class="field-label" for="editLine">任务线 / 周期</label>
                  <div class="wire field"><div class="wire-inner"><input id="editLine" placeholder="Quest line / cycle..." /></div></div>
                </div>
                <div class="labeled-field task-field-hidden" data-task-field="recurrence">
                  <label class="field-label" for="editRecurrence">周期</label>
                  <div class="wire field select-wrap"><div class="wire-inner">
                    <select id="editRecurrence">
                      <option value="Daily">Daily</option>
                      <option value="Weekly">Weekly</option>
                      <option value="Custom">Custom</option>
                    </select>
                  </div></div>
                </div>
              </div>
            </div>

            <div class="labeled-field">
              <label class="field-label" for="editDesc">备注</label>
              <div class="wire textarea-field"><div class="wire-inner"><textarea id="editDesc" placeholder="Quest notes..."></textarea></div></div>
            </div>
            <button class="chamfer shaded" type="button" id="saveTask" style="width:100%;height:44px;">
              <span class="chamfer-outer"><span class="chamfer-mid"><span class="chamfer-line"><span class="chamfer-face">Save Changes</span></span></span></span>
            </button>
            <button class="danger-text-button task-field-hidden" type="button" id="deleteTaskFromEditor">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>
              <span>Delete Quest</span>
            </button>
          </div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <section class="wire modal">
        <div class="wire-inner">
          <div class="modal-head">
            <div class="section-title serif" id="settingsTitle"><span class="diamond"></span><span class="text">Settings</span><span class="diamond"></span></div>
            <button class="plain-icon-button" type="button" id="closeSettings" aria-label="Close settings">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </div>
          <div class="form-stack">
            <div class="labeled-field">
              <div class="field-label" id="languageLabel">Language</div>
              <div class="language-options">
                <button class="language-option" type="button" data-language="zh">中文</button>
                <button class="language-option" type="button" data-language="en">English</button>
              </div>
            </div>
            <div class="labeled-field">
              <div class="field-label" id="agentSettingsLabel">AI Agent API</div>
              <div class="form-stack">
                <div class="wire field"><div class="wire-inner"><input id="agentApiBase" placeholder="API Base URL..." /></div></div>
                <div class="wire field"><div class="wire-inner"><input id="agentApiKey" type="password" placeholder="API Key..." /></div></div>
                <div class="wire field"><div class="wire-inner"><input id="agentModel" placeholder="Model..." /></div></div>
                <button class="language-option" type="button" id="saveAgentSettings">Save Agent API</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="noteModal" role="dialog" aria-modal="true" aria-labelledby="noteModalTitle">
      <section class="wire modal">
        <div class="wire-inner">
          <div class="modal-head">
            <div class="section-title serif" id="noteModalTitle"><span class="diamond"></span><span class="text">Adventure Note</span><span class="diamond"></span></div>
            <button class="plain-icon-button" type="button" id="closeNoteModal" aria-label="Close note editor">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </div>
          <div class="form-stack">
            <div class="labeled-field">
              <label class="field-label" for="noteTitle">笔记标题</label>
              <div class="wire field"><div class="wire-inner"><input id="noteTitle" placeholder="Note title..." /></div></div>
            </div>
            <div class="labeled-field">
              <label class="field-label" for="noteBody">内容</label>
              <div class="wire textarea-field" style="height:150px;"><div class="wire-inner"><textarea id="noteBody" placeholder="Write your field notes..."></textarea></div></div>
            </div>
            <button class="chamfer shaded" type="button" id="saveNote" style="width:100%;height:44px;">
              <span class="chamfer-outer"><span class="chamfer-mid"><span class="chamfer-line"><span class="chamfer-face">Save Note</span></span></span></span>
            </button>
          </div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="questBookModal" role="dialog" aria-modal="true" aria-labelledby="qbModalTitle">
      <section class="wire modal">
        <div class="wire-inner">
          <div class="modal-head">
            <div class="section-title serif" id="qbModalTitle"><span class="diamond"></span><span class="text">Create Quest Book</span><span class="diamond"></span></div>
            <button class="plain-icon-button" type="button" id="closeQBModal" aria-label="Close editor">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </div>
          <div class="form-stack">
            <div class="labeled-field qb-editor-name">
              <label class="field-label" for="qbName">任务书名称</label>
              <input id="qbName" placeholder="Quest book name..." />
            </div>
            <div class="modal-grid">
              <div class="labeled-field">
                <label class="field-label" for="qbStart">开始日期</label>
                <div class="wire field"><div class="wire-inner"><input id="qbStart" type="date" /></div></div>
              </div>
              <div class="labeled-field">
                <label class="field-label" for="qbEnd">结束日期</label>
                <div class="wire field"><div class="wire-inner"><input id="qbEnd" type="date" /></div></div>
              </div>
            </div>

            <div class="qb-section-divider"><span>任务线</span></div>
            <div id="qbQuestLinesContainer"></div>
            <button class="qb-editor-add-btn" type="button" id="qbAddQuestLineBtn">+ 添加任务线</button>

            <div class="qb-section-divider"><span>独立任务</span></div>
            <div id="qbIndependentContainer"></div>
            <button class="qb-editor-add-btn" type="button" id="qbAddIndependentBtn">+ 添加独立任务</button>

            <button class="chamfer shaded" type="button" id="saveQuestBook" style="width:100%;height:44px;">
              <span class="chamfer-outer"><span class="chamfer-mid"><span class="chamfer-line"><span class="chamfer-face">Save Quest Book</span></span></span></span>
            </button>
          </div>
        </div>
      </section>
    </div>

    <div class="modal-backdrop" id="qbItemModal" role="dialog" aria-modal="true" aria-labelledby="qbItemModalTitle">
      <section class="wire modal">
        <div class="wire-inner">
          <div class="modal-head">
            <div class="section-title serif" id="qbItemModalTitle"><span class="diamond"></span><span class="text">Edit Quest Item</span><span class="diamond"></span></div>
            <button class="plain-icon-button" type="button" id="closeQBItemModal" aria-label="Close editor">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
            </button>
          </div>
          <div class="form-stack">
            <div class="labeled-field">
              <label class="field-label" for="qbItemTitle">标题</label>
              <div class="wire field"><div class="wire-inner"><input id="qbItemTitle" placeholder="Quest item title..." /></div></div>
            </div>
            <div class="modal-grid">
              <div class="labeled-field">
                <label class="field-label" for="qbItemStart">开始日期</label>
                <div class="wire field"><div class="wire-inner"><input id="qbItemStart" type="date" /></div></div>
              </div>
              <div class="labeled-field">
                <label class="field-label" for="qbItemEnd">结束日期 <span style="font-weight:400;opacity:0.5;">（留空=当天）</span></label>
                <div class="wire field"><div class="wire-inner"><input id="qbItemEnd" type="date" /></div></div>
              </div>
            </div>
            <div class="labeled-field" id="qbItemTimeField">
              <label class="field-label" for="qbItemStartTime">时间段</label>
              <div class="wire field" style="display:flex;gap:4px;align-items:center;">
                <div class="wire-inner" style="flex:1;"><input id="qbItemStartTime" type="time" placeholder="开始" /></div>
                <span style="font-size:10px;opacity:0.5;">—</span>
                <div class="wire-inner" style="flex:1;"><input id="qbItemEndTime" type="time" placeholder="结束" /></div>
              </div>
            </div>
            <div class="labeled-field">
              <label class="field-label" for="qbItemDesc">备注</label>
              <div class="wire textarea-field"><div class="wire-inner"><textarea id="qbItemDesc" placeholder="Quest item notes..."></textarea></div></div>
            </div>
            <button class="chamfer shaded" type="button" id="saveQBItem" style="width:100%;height:44px;">
              <span class="chamfer-outer"><span class="chamfer-mid"><span class="chamfer-line"><span class="chamfer-face">Save</span></span></span></span>
            </button>
          </div>
        </div>
      </section>
    </div>

    <script src="js/state.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/render.js"></script>
    <script src="js/render-today.js"></script>
    <script src="js/render-questbook.js"></script>
    <script src="js/render-timeline.js"></script>
    <script src="js/render-notes.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/render-dialogue.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
